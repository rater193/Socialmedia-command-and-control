    const $=id=>document.getElementById(id),p=id=>platforms.find(x=>x.id===id),v=id=>videos.find(x=>x.id===id),c=id=>comments.find(x=>x.id===id),cp=id=>comments.filter(x=>x.platformId===id),cv=id=>comments.filter(x=>x.videoId===id);function count(nodes){let n=0;(function walk(a){a.forEach(x=>{n+=(x.replies||[]).length;walk(x.replies||[])})})(nodes);return n}function find(nodes,id){for(const x of nodes){if(x.id===id)return x;const y=find(x.replies||[],id);if(y)return y}return null}function initials(name){return name==='You'?'YOU':name.replace('@','').split(/\s+/).map(x=>x[0]).join('').slice(0,2).toUpperCase()}function targets(video){return Object.values(video.uploadTargets).filter(Boolean).length}function toggleSidebar(){sidebarOpen=!sidebarOpen;applySidebar()}function closeSidebar(){sidebarOpen=false;applySidebar()}function applySidebar(){$('sidebar').classList.toggle('open',sidebarOpen);$('scrim').classList.toggle('active',sidebarOpen)}
    function setView(view){currentView=view;activeReplyTargetId=null;activeCommentId=null;closeSidebar();document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));$(view+'View').classList.add('active');document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.view===view));$('pageTitle').textContent=meta[view][0];$('pageSubtitle').textContent=meta[view][1];if(view==='dashboard')renderDashboard();if(view==='platforms')renderPlatforms();if(view==='videos')renderVideos();if(view==='comments')renderComments()}
    function shell(){$('platformMiniList').innerHTML=platforms.map(x=>`<button class="nav" onclick="openPlatform('${x.id}')"><span class="nav-icon ${x.gradient}">${x.icon}</span>${x.name}</button>`).join('');document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));renderDashboard();renderPlatforms();renderVideos();renderComments()}
    function platformCard(x){return `<button class="card" onclick="openPlatform('${x.id}')"><div class="card-top"><div class="big ${x.gradient}">${x.icon}</div><span class="badge ${x.status==='Healthy'?'green':'yellow'}">${x.status}</span></div><div><h3>${x.name}</h3><p>${videos.filter(y=>y.uploadTargets[x.id]).length} selected videos · ${cp(x.id).length} tracked comment threads</p></div><div class="mini"><div><strong>${x.followers}</strong><span>Followers</span></div><div><strong>${x.reach}</strong><span>Reach</span></div><div><strong>${x.unread}</strong><span>Unread</span></div></div></button>`}
    function videoCard(x){const enabled=Object.entries(x.uploadTargets).filter(([_,e])=>e).map(([id])=>p(id).icon).join(' '),g=x.status==='Needs Edit'?'warn':'vid';return `<button class="card" onclick="openVideo('${x.id}')"><div class="card-top"><div class="big ${g}">${x.icon}</div><span class="badge ${x.status==='Needs Edit'?'yellow':'blue'}">${x.status}</span></div><div><h3>${x.title}</h3><p>${x.type} · ${x.length} · ${x.campaign}</p></div><div class="mini"><div><strong>${targets(x)}</strong><span>Targets</span></div><div><strong>${cv(x.id).length}</strong><span>Comments</span></div><div><strong>${enabled||'—'}</strong><span>Platforms</span></div></div></button>`}
    function commentCard(x){const pl=p(x.platformId),vi=v(x.videoId),r=count([x]);return `<button class="card" onclick="openComment('${x.id}')"><div class="card-top"><div class="big ${pl.gradient}">💬</div><span class="badge ${x.sentiment==='Useful Feedback'?'yellow':'green'}">${x.sentiment}</span></div><div><h3>${x.user}</h3><p>${x.comment}</p></div><div class="mini"><div><strong>${pl.name}</strong><span>Platform</span></div><div><strong>${r}</strong><span>Replies</span></div><div><strong>${vi.icon}</strong><span>Video</span></div></div></button>`}
    function renderDashboard(){const unread=platforms.reduce((s,x)=>s+x.unread,0),queued=videos.filter(x=>x.status==='Queued').length;$('dashboardView').innerHTML=`<div class="hero-grid"><div class="hero"><h2>Everything important is one click away.</h2><p>This optimized layout uses a hamburger menu, dashboard shortcuts, global search, and direct cards for platforms, videos, and comments.</p><div class="quick"><button class="primary" onclick="openUploadWindow()">Upload New Video</button><button class="ghost" onclick="setView('comments')">Reply to Comments</button><button class="ghost" onclick="setView('videos')">Manage Videos</button><button class="ghost" onclick="setView('platforms')">Open Platforms</button></div></div><div class="stats"><div class="stat"><span>Total Reach</span><strong>290K</strong></div><div class="stat"><span>Unread Comments</span><strong>${unread}</strong></div><div class="stat"><span>Video Assets</span><strong>${videos.length}</strong></div><div class="stat"><span>Queued Videos</span><strong>${queued}</strong></div></div></div><div class="two"><div><div class="section"><div><h2>Priority Comments</h2><p>Open a thread directly.</p></div><button class="ghost" onclick="setView('comments')">View All</button></div><div class="grid">${comments.slice(0,3).map(commentCard).join('')}</div><div class="section"><div><h2>Active Videos</h2><p>Manage videos and platform stats.</p></div><button class="ghost" onclick="setView('videos')">Manage All</button></div><div class="grid">${videos.slice(0,3).map(videoCard).join('')}</div></div><aside><div class="panel"><h3>Platform Snapshot</h3><p>Jump directly into a platform workspace.</p><div class="list">${platforms.map(x=>`<button class="row" onclick="openPlatform('${x.id}')"><div><strong>${x.icon} ${x.name}</strong><span>${x.reach} reach · ${x.unread} unread</span></div><span class="badge ${x.status==='Healthy'?'green':'yellow'}">${x.status}</span></button>`).join('')}</div></div></aside></div>`}
    function renderPlatforms(){$('platformsView').innerHTML=`<div class="section"><div><h2>Platforms</h2><p>Every platform opens straight into its workspace.</p></div><button class="primary" onclick="openUploadWindow()">Upload Video</button></div><div class="grid">${platforms.map(platformCard).join('')}</div>`}
    function renderVideos(){$('videosView').innerHTML=`<div class="split"><aside class="filter"><h3>Video Filters</h3><button class="active">All Videos <span>${videos.length}</span></button><button>Ready <span>${videos.filter(x=>x.status==='Ready').length}</span></button><button>Queued <span>${videos.filter(x=>x.status==='Queued').length}</span></button><button>Published <span>${videos.filter(x=>x.status==='Published').length}</span></button><button>Needs Edit <span>${videos.filter(x=>x.status==='Needs Edit').length}</span></button><button class="primary" style="width:100%;justify-content:center" onclick="openUploadWindow()">Upload New Video</button></aside><div><div class="section" style="margin-top:0"><div><h2>Videos</h2><p>Global asset list. Open any video to configure platform targets.</p></div></div><div class="grid">${videos.map(videoCard).join('')}</div></div></div>`}
    function renderComments(){$('commentsView').innerHTML=`<div class="split"><aside class="filter"><h3>Comment Filters</h3><button class="active">All Threads <span>${comments.length}</span></button><button>Awaiting Reply <span>${comments.filter(x=>!x.replies.length).length}</span></button><button>Useful Feedback <span>${comments.filter(x=>x.sentiment==='Useful Feedback').length}</span></button><button>Positive <span>${comments.filter(x=>x.sentiment==='Positive').length}</span></button><button class="ghost" style="width:100%;justify-content:center" onclick="openAllComments()">Open Thread Inbox</button></aside><div><div class="section" style="margin-top:0"><div><h2>Comments</h2><p>Open a card to reply in hierarchical order.</p></div></div><div class="grid">${comments.map(commentCard).join('')}</div></div></div>`}
    function openWindow(title,html){activeReplyTargetId=null;$('windowTitle').textContent=title;$('windowBody').innerHTML=html;$('overlay').classList.add('active')}function closeWindow(){activeReplyTargetId=null;activeCommentId=null;$('overlay').classList.remove('active');$('windowBody').innerHTML=''}
    function openUploadWindow(){openWindow('Upload Video',`<div class="modal-grid"><div class="modal-card" style="padding:18px"><div class="preview vid"><div style="font-size:52px">⬆️</div></div><h3 style="margin:0;font-size:24px">Upload a new campaign video</h3><p>Create a global video asset, choose platform targets, title variants, thumbnails, captions, and schedule rules.</p><div class="quick"><button class="primary">Choose File</button><button class="ghost">Import From Library</button><button class="ghost">Record Clip</button></div></div><aside class="panel"><h3>Default Targets</h3><p>Select platforms for the new upload.</p><div class="toggle-list">${platforms.map(x=>`<div class="toggle-row"><div class="left"><div class="dot ${x.gradient}">${x.icon}</div><div><strong>${x.name}</strong><p style="margin:2px 0 0;font-size:12px">Use platform defaults</p></div></div><span class="toggle on"></span></div>`).join('')}</div></aside></div>`)}
    function openPlatform(id){closeSidebar();const pl=p(id),pv=videos.filter(x=>x.uploadTargets[id]),pc=cp(id);openWindow(`${pl.name} Workspace`,`<div class="modal-grid"><div><div class="hero" style="margin-bottom:16px"><div class="card-top"><div class="big ${pl.gradient}">${pl.icon}</div><span class="badge ${pl.status==='Healthy'?'green':'yellow'}">${pl.status}</span></div><h2 style="font-size:34px;margin-top:16px">${pl.name}</h2><p>Fast workspace view for comments, videos, analytics, account settings, and scheduling.</p><div class="quick"><button class="primary" onclick="openPlatformComments('${id}')">Open Comments</button><button class="ghost" onclick="openPlatformVideos('${id}')">Manage Videos</button><button class="ghost">Account Settings</button><button class="ghost">Analytics</button></div></div><div class="section"><div><h2>Selected Videos</h2><p>Videos configured for ${pl.name}.</p></div></div><div class="grid">${pv.map(videoCard).join('')}</div></div><aside><div class="panel"><h3>Platform Stats</h3><div class="list"><div class="row"><div><strong>${pl.followers}</strong><span>Followers</span></div></div><div class="row"><div><strong>${pl.reach}</strong><span>Total reach</span></div></div><div class="row"><div><strong>${pl.unread}</strong><span>Unread comments</span></div></div></div></div><div class="panel" style="margin-top:14px"><h3>Recent Comments</h3><div class="list">${pc.slice(0,4).map(x=>`<button class="row" onclick="openComment('${x.id}')"><div><strong>${x.user}</strong><span>${v(x.videoId).title}</span></div></button>`).join('')||'<div class="row"><div><strong>No comments</strong><span>No tracked comments yet.</span></div></div>'}</div></div></aside></div>`)}
    function openPlatformComments(id){const pl=p(id);openWindow(`${pl.name} Comments`,threadInbox(cp(id),`${pl.name} Comments`))}function openPlatformVideos(id){const pl=p(id),pv=videos.filter(x=>x.uploadTargets[id]);openWindow(`${pl.name} Videos`,`<div class="section" style="margin-top:0"><div><h2>${pl.name} Videos</h2><p>Videos configured for ${pl.name}.</p></div><button class="primary" onclick="openUploadWindow()">Upload Video</button></div><div class="grid">${pv.map(videoCard).join('')}</div>`)}
    function openVideo(id){const x=v(id);openWindow(`Video / ${x.title}`,`<div class="modal-grid"><div><div class="modal-card" style="padding:18px"><div class="preview ${x.status==='Needs Edit'?'warn':'vid'}"><div class="play">▶</div><div class="length">${x.length}</div></div><div class="card-top"><div><h3 style="margin:0;font-size:24px">${x.title}</h3><p>${x.notes}</p></div><span class="badge ${x.status==='Needs Edit'?'yellow':'blue'}">${x.status}</span></div></div><div class="panel" style="margin-top:14px"><h3>Platform Upload Configuration</h3><p>Configure where this video should be uploaded.</p><div class="toggle-list">${platforms.map(pl=>`<div class="toggle-row"><div class="left"><div class="dot ${pl.gradient}">${pl.icon}</div><div><strong>${pl.name}</strong><p style="margin:2px 0 0;font-size:12px">${x.uploadTargets[pl.id]?'Selected for upload':'Not selected'}</p></div></div><span class="toggle ${x.uploadTargets[pl.id]?'on':''}"></span></div>`).join('')}</div></div><div class="panel" style="margin-top:14px"><h3>Condensed Platform Stats</h3><div class="stats-table">${platforms.map(pl=>{const s=x.stats[pl.id]||{status:'Not configured',views:'-',likes:'-',comments:'-',shares:'-'};return `<div class="stats-row"><div class="left"><div class="dot ${pl.gradient}">${pl.icon}</div><div><strong>${pl.name}</strong><span>${s.status}</span></div></div><div><strong>${s.views}</strong><span>views</span></div><div><strong>${s.likes}</strong><span>likes</span></div><div><strong>${s.comments}</strong><span>comments</span></div><div><strong>${s.shares}</strong><span>shares</span></div></div>`}).join('')}</div></div></div><aside><div class="panel"><h3>Video Actions</h3><div class="list"><button class="row"><div><strong>Edit Metadata</strong><span>Title, tags, thumbnail</span></div></button><button class="row"><div><strong>Upload to Selected</strong><span>Push to configured platforms</span></div></button><button class="row"><div><strong>Schedule Release</strong><span>Queue campaign timing</span></div></button></div></div><div class="panel" style="margin-top:14px"><h3>Related Comments</h3><div class="list">${cv(x.id).map(y=>`<button class="row" onclick="openComment('${y.id}')"><div><strong>${y.user}</strong><span>${p(y.platformId).name} · ${y.sentiment}</span></div></button>`).join('')||'<div class="row"><div><strong>No comments</strong><span>No tracked comments for this video.</span></div></div>'}</div></div></aside></div>`)}
    function openAllComments(){openWindow('All Comment Threads',threadInbox(comments,'All Comment Threads'))}function threadInbox(items,title){return `<div class="modal-grid"><div><div class="section" style="margin-top:0"><div><h2>${title}</h2><p>Open a thread to reply in hierarchical order.</p></div></div><div class="grid">${items.map(commentCard).join('')}</div></div><aside><div class="panel"><h3>Thread Stats</h3><div class="list"><div class="row"><div><strong>${items.length}</strong><span>Top-level comments</span></div></div><div class="row"><div><strong>${items.reduce((s,x)=>s+count([x]),0)}</strong><span>Total replies</span></div></div><div class="row"><div><strong>${items.filter(x=>!x.replies.length).length}</strong><span>Awaiting reply</span></div></div></div></div></aside></div>`}
    function openComment(id){activeCommentId=id;const x=c(id),pl=p(x.platformId),vi=v(x.videoId);openWindow(`Comment / ${x.user}`,singleThread(x,pl,vi))}function singleThread(x,pl,vi){return `<div class="modal-grid"><div class="panel"><div class="context"><div class="big ${pl.gradient}" style="width:50px;height:50px">${vi.icon}</div><div><strong>${vi.title}</strong><div style="color:var(--muted);font-size:13px">${pl.name} · ${x.sentiment} · ${x.time}</div></div></div><div class="thread">${node(x,false)}</div></div><aside><div class="panel"><h3>Thread Context</h3><div class="list"><div class="row"><div><strong>${vi.title}</strong><span>Video</span></div></div><div class="row"><div><strong>${pl.name}</strong><span>Platform</span></div></div><div class="row"><div><strong>${count([x])}</strong><span>Replies</span></div></div></div></div><div class="panel" style="margin-top:14px"><h3>Fast Actions</h3><div class="list"><button class="row" onclick="showReply('${x.id}')"><div><strong>Reply to Original</strong><span>Respond under the root comment</span></div></button><button class="row" onclick="openVideo('${vi.id}')"><div><strong>Open Related Video</strong><span>View platform stats</span></div></button></div></div></aside></div>`}function node(x,isReply){const kids=(x.replies||[]).map(r=>node(r,true)).join(''),comp=activeReplyTargetId===x.id?composer(x.id):'',owner=x.owner?'owner':'';return `<div class="node ${isReply?'reply':''}"><div class="avatar ${owner}">${initials(x.user)}</div><div><div class="bubble ${owner}"><div class="meta"><span class="user">${x.user}</span>${x.sentiment?`<span class="badge yellow">${x.sentiment}</span>`:''}${x.owner?'<span class="badge green">Your Reply</span>':''}<span class="time">${x.time}</span></div><p class="text">${x.comment}</p><div class="comment-actions"><button class="small" onclick="showReply('${x.id}')">Reply</button><button class="small">Mark Reviewed</button></div></div>${comp}${kids}</div></div>`}function composer(id){return `<div class="composer"><textarea id="replyText-${id}" placeholder="Write a reply..."></textarea><div class="composer-actions"><button class="ghost" onclick="cancelReply()">Cancel</button><button class="primary" onclick="submitReply('${id}')">Post Reply</button></div></div>`}function showReply(id){activeReplyTargetId=id;refreshThread();setTimeout(()=>{const t=$(`replyText-${id}`);if(t)t.focus()},0)}function cancelReply(){activeReplyTargetId=null;refreshThread()}function submitReply(parentId){const t=$(`replyText-${parentId}`),text=t?t.value.trim():'';if(!text){if(t)t.focus();return}const parent=find(comments,parentId);if(!parent)return;(parent.replies||(parent.replies=[])).push({id:`reply-${commentIdCounter++}`,user:'You',owner:true,comment:text,time:'Just now',replies:[]});activeReplyTargetId=null;refreshThread();renderDashboard();renderComments()}function refreshThread(){if(!activeCommentId)return;const x=c(activeCommentId);$('windowBody').innerHTML=singleThread(x,p(x.platformId),v(x.videoId))}
    function wireSearch(){$('globalSearch').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();if(!q){renderDashboard();renderPlatforms();renderVideos();renderComments();return}const vm=videos.filter(x=>[x.title,x.type,x.campaign,x.status,x.notes].join(' ').toLowerCase().includes(q)),cm=comments.filter(x=>{const vi=v(x.videoId),pl=p(x.platformId);return [x.user,x.comment,x.sentiment,vi.title,pl.name].join(' ').toLowerCase().includes(q)}),pm=platforms.filter(x=>[x.name,x.status,x.reach,x.followers].join(' ').toLowerCase().includes(q));$('dashboardView').innerHTML=`<div class="hero"><h2>Search Results</h2><p>Showing matches for <strong>${q}</strong>. Open any result directly.</p></div><div class="section"><div><h2>Platforms</h2><p>${pm.length} matches</p></div></div><div class="grid">${pm.map(platformCard).join('')||'<div class="panel"><p>No platform matches.</p></div>'}</div><div class="section"><div><h2>Videos</h2><p>${vm.length} matches</p></div></div><div class="grid">${vm.map(videoCard).join('')||'<div class="panel"><p>No video matches.</p></div>'}</div><div class="section"><div><h2>Comments</h2><p>${cm.length} matches</p></div></div><div class="grid">${cm.map(commentCard).join('')||'<div class="panel"><p>No comment matches.</p></div>'}</div>`;setView('dashboard')})}
    shell();wireSearch();$('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeWindow()});document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(sidebarOpen){closeSidebar();return}closeWindow()}});
  </script>
